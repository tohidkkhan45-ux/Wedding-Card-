<!DOCTYPE html>
<html>
<head>
<title>Login & Signup</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("287g46US2fGjoY4LL");
})();

function sendSignup(event){
event.preventDefault();

emailjs.send("service_3ux49q7","template_5aajh27",{
username: document.getElementById("signupUser").value,
email: document.getElementById("signupEmail").value
password: document.getElementById("signupemail").value
}).then(function(){
alert("Signup request sent!");
});
}

function showSignup(){
document.getElementById("loginBox").style.display="none";
document.getElementById("signupBox").style.display="block";
}

function showLogin(){
document.getElementById("signupBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}
</script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
cursor:pointer;
color:#667eea;
}

</style>

</head>

<body>

<div class="container">

<div id="loginBox">

<h2>Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>

<p>No account? <a onclick="showSignup()">Signup</a></p>

</div>

<div id="signupBox" style="display:none">

<h2>Signup</h2>

<form onsubmit="sendSignup(event)">
<input type="text" id="signupUser" placeholder="Username" required>
<input type="email" id="signupEmail" placeholder="Email" required>
<button type="submit">Signup</button>
</form>

<p>Already account? <a onclick="showLogin()">Login</a></p>

</div>

</div>

</body>
</html>
